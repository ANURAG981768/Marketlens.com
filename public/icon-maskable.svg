    <rect x="8" y="24" width="4" height="8" rx="1" fill="#fff" opacity=".5"/>
    <rect x="14" y="19" width="4" height="13" rx="1" fill="#fff" opacity=".65"/>
    <rect x="20" y="14" width="4" height="18" rx="1" fill="#fff" opacity=".8"/>
    <rect x="26" y="9" width="4" height="23" rx="1" fill="#fff" opacity=".95"/>
    <circle cx="24" cy="18" r="9" stroke="#fff" stroke-width="2.5" fill="none"/>
    <line x1="30" y1="24" x2="34" y2="28" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>
  </g>
</svg>
